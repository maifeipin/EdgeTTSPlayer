name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Trigger on tag push like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Use 3.11 for good compatibility with Pygame and edge-tts

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "EdgeTTSPlayer" main.py

    - name: Zip the build
      run: |
        Compress-Archive -Path dist\EdgeTTSPlayer\* -DestinationPath EdgeTTSPlayer-Windows.zip

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: EdgeTTSPlayer-Windows.zip
        draft: false
        prerelease: false

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      if: github.event_name == 'workflow_dispatch' || !startsWith(github.ref, 'refs/tags/')
      with:
        name: EdgeTTSPlayer-Windows
        path: EdgeTTSPlayer-Windows.zip
