name: Build and Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: EdgeTTSPlayer-Windows.zip
            asset_name: EdgeTTSPlayer-Windows
          - os: macos-latest
            artifact_name: EdgeTTSPlayer-macOS.zip
            asset_name: EdgeTTSPlayer-macOS
          - os: ubuntu-latest
            artifact_name: EdgeTTSPlayer-Linux.zip
            asset_name: EdgeTTSPlayer-Linux

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install dependencies (Windows/macOS)
      if: runner.os != 'Linux'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "EdgeTTSPlayer" main.py

    - name: Zip the build (Windows)
      if: runner.os == 'Windows'
      run: |
        Compress-Archive -Path dist\EdgeTTSPlayer\* -DestinationPath ${{ matrix.artifact_name }}

    - name: Zip the build (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist && zip -r ../${{ matrix.artifact_name }} EdgeTTSPlayer.app

    - name: Zip the build (Linux)
      if: runner.os == 'Linux'
      run: |
        cd dist/EdgeTTSPlayer && zip -r ../../${{ matrix.artifact_name }} .

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'release'
      with:
        files: ${{ matrix.artifact_name }}
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      if: github.event_name == 'workflow_dispatch'
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.artifact_name }}
